<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>commencement.stt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #fafaf8;
            color: #1a1a1a;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { max-width: 720px; margin: 0 auto; padding: 60px 24px; }

        h1 { font-size: 32px; font-weight: 400; letter-spacing: -0.5px; margin-bottom: 4px; }
        .tagline { color: #666; font-size: 18px; font-style: italic; margin-bottom: 32px; }

        .section { border-top: 1px solid #ddd; padding: 32px 0; }
        h2 { font-size: 14px; font-weight: 400; text-transform: uppercase; letter-spacing: 1.5px; color: #999; margin-bottom: 20px; }

        /* Tabs */
        .tabs { display: flex; gap: 0; border-bottom: 2px solid #ddd; margin-bottom: 32px; }
        .tab {
            padding: 12px 24px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab:hover { color: #666; }
        .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Form */
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 4px; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #1a1a1a;
            outline: none;
        }
        input:focus, select:focus { border-color: #1a1a1a; }
        input::placeholder { color: #bbb; }

        .btn {
            width: 100%;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background: #1a1a1a;
            color: #fafaf8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #333; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Progress */
        .progress-section { display: none; padding: 24px 0; }
        .progress-section.active { display: block; }
        .steps { display: flex; gap: 24px; margin-bottom: 20px; font-size: 14px; }
        .step-item { color: #ccc; }
        .step-item.active { color: #1a1a1a; font-style: italic; }
        .step-item.done { color: #666; text-decoration: line-through; }
        .progress-bar-wrap { background: #eee; border-radius: 2px; height: 6px; margin-bottom: 12px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #1a1a1a; width: 0%; transition: width 0.3s ease; }
        .status { font-size: 14px; color: #666; margin-bottom: 4px; }
        .latest { font-size: 14px; color: #999; font-style: italic; }

        /* Results */
        .results-section { display: none; }
        .results-section.active { display: block; }
        .results-meta { font-size: 14px; color: #666; margin-bottom: 16px; }
        .results-meta span { color: #1a1a1a; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th { text-align: left; padding: 8px 0; border-bottom: 2px solid #1a1a1a; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; }
        td { padding: 8px 0; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f5f5f3; }
        .degree-cell { font-size: 13px; color: #666; }
        .table-wrap { max-height: 600px; overflow-y: auto; }

        .error-msg { display: none; padding: 12px 16px; border-left: 3px solid #c00; background: #fff5f5; color: #900; font-size: 14px; margin-top: 16px; }
        .error-msg.active { display: block; }

        /* Queue */
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .queue-item .qi-info { color: #666; }
        .queue-item .qi-status { font-size: 12px; color: #999; font-style: italic; }
        .queue-item .qi-status.active { color: #1a1a1a; font-style: normal; font-weight: 600; }

        /* Heatmap */
        .heatmap-container {
            position: relative;
            margin-bottom: 16px;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        .heatmap-viewport {
            overflow: hidden;
        }
        .heatmap-viewport.scrollable {
            overflow: scroll;
            max-height: 450px;
            scrollbar-width: none;
        }
        .heatmap-viewport.scrollable::-webkit-scrollbar { display: none; }
        .heatmap-inner {
            min-width: max-content;
        }
        .heatmap { border-collapse: collapse; font-size: 13px; }
        .heatmap th { padding: 6px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; font-weight: 400; border-bottom: 1px solid #ddd; white-space: nowrap; cursor: pointer; transition: font-size 0.3s ease, padding 0.3s ease; }
        .heatmap th:first-child { cursor: default; }
        .heatmap th:hover:not(:first-child) { color: #1a1a1a; }
        .heatmap th.selected { color: #1a1a1a; font-weight: 600; border-bottom: 2px solid #1a1a1a; }
        .heatmap td { padding: 0; text-align: center; }
        .heatmap .school-name { text-align: left; padding: 4px 8px; font-size: 13px; white-space: nowrap; color: #333; cursor: pointer; transition: font-size 0.3s ease, padding 0.3s ease; }
        .heatmap .school-name:hover { color: #000; text-decoration: underline; }
        .heatmap .school-name.selected { font-weight: 600; color: #000; }
        .hm-cell {
            width: 36px; height: 24px;
            cursor: pointer;
            border-radius: 2px;
            margin: 1px;
            transition: width 0.3s ease, height 0.3s ease;
        }
        .hm-cell.has-data:hover { outline: 2px solid #1a1a1a; }
        .hm-cell.has-data.selected { outline: 2px solid #1a1a1a; }
        .hm-empty { background: #f0f0ee; border-radius: 2px; margin: 1px; width: 36px; height: 24px; transition: width 0.3s ease, height 0.3s ease; }
        /* Labels hidden by default, shown at full zoom */
        .hm-label { display: none; font-size: 11px; color: #fff; font-weight: 600; }
        .heatmap-container.zoom-full .hm-label { display: block; }
        .heatmap-container.zoom-full .hm-cell { width: 48px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .heatmap-container.zoom-full .hm-empty { width: 48px; height: 28px; }
        /* Min zoom: table hidden, grid shown */
        .hm-grid { display: none; gap: 1.5px; }
        .heatmap-container.zoom-min .heatmap { display: none !important; }
        .heatmap-container.zoom-min .hm-grid { display: grid; }
        .hm-grid-cell {
            width: 100%; aspect-ratio: 1.8;
            border-radius: 1.5px;
            background: #ececea;
            cursor: pointer;
        }
        .hm-grid-cell:hover { outline: 1.5px solid #1a1a1a; }
        .hm-grid-cell.selected { outline: 1.5px solid #1a1a1a; }
        /* Mid zoom */
        .heatmap-container.zoom-mid .school-name { font-size: 10px; padding: 3px 6px; }
        .heatmap-container.zoom-mid .heatmap th { font-size: 9px; padding: 4px 4px; }
        .heatmap-container.zoom-mid .hm-cell,
        .heatmap-container.zoom-mid .hm-empty { width: 24px; height: 16px; }

        /* Dataset cards */
        .dataset-card { border: 1px solid #eee; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .dataset-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .dataset-title { font-size: 16px; font-weight: 600; }
        .dataset-meta { font-size: 13px; color: #999; }
        .dataset-toggle { background: none; border: none; font-family: 'Times New Roman', serif; font-size: 13px; color: #999; cursor: pointer; padding: 0; margin-top: 8px; }
        .dataset-toggle:hover { color: #1a1a1a; }
        .dataset-preview { display: none; font-size: 13px; color: #666; }
        .dataset-preview.open { display: block; }
        .dataset-preview table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        .dataset-preview td { padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
        .dataset-preview .degree { color: #999; font-size: 12px; }
        .dataset-preview .more { color: #999; font-style: italic; padding-top: 8px; }
        .btn-download { padding: 8px 16px; font-family: 'Times New Roman', serif; font-size: 13px; background: #1a1a1a; color: #fafaf8; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .btn-download:hover { background: #333; }

        footer { border-top: 1px solid #ddd; padding-top: 24px; margin-top: 48px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>commencement.stt</h1>
        <p class="tagline">Extract every graduate from a commencement ceremony.</p>

        <!-- Invite gate -->
        <div class="section" id="inviteSection">
            <h2>Enter invite code</h2>
            <div class="form-group" style="margin-bottom: 16px;">
                <input type="text" id="inviteCode" placeholder="three-word-code" autocomplete="off" style="text-align:center; letter-spacing: 1px;">
            </div>
            <button class="btn" id="inviteBtn">Enter</button>
            <p id="inviteError" style="display:none; color:#c00; font-size:13px; margin-top:12px; text-align:center;">Invalid invite code.</p>
        </div>

        <!-- Main app (hidden until invited) -->
        <div id="appSection" style="display:none;">
            <div class="tabs">
                <button class="tab active" data-tab="scraper">Scraper</button>
                <button class="tab" data-tab="datasets">Datasets</button>
            </div>

            <!-- Scraper tab -->
            <div class="tab-content active" id="tab-scraper">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>YouTube URL</label>
                    <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>School</label>
                        <select id="school">
                            <option value="" disabled selected>Select school...</option>
                        </select>
                        <div id="requestSchoolWrap" style="display:none; margin-top:8px;">
                            <div style="display:flex; gap:8px;">
                                <input type="text" id="requestSchoolInput" placeholder="e.g. University of Toronto" style="flex:1;">
                                <button class="btn" id="requestSchoolBtn" style="width:auto; padding:10px 16px; font-size:14px;">Request</button>
                            </div>
                            <div id="requestSchoolMsg" style="display:none; font-size:13px; margin-top:6px; color:#666;"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Term</label>
                        <select id="term">
                            <option value="Spring">Spring</option>
                            <option value="Summer">Summer</option>
                            <option value="Fall">Fall</option>
                            <option value="Winter">Winter</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <select id="year">
                            <option value="2025" selected>2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                            <option value="2020">2020</option>
                        </select>
                    </div>
                </div>
                <button class="btn" id="startBtn">Extract graduates</button>

                <div id="userQueue" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px;">
                    <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 8px;">Your queue</div>
                    <div id="userQueueList"></div>
                </div>

                <!-- Progress -->
                <div class="progress-section" id="progressSection">
                    <div class="steps">
                        <div class="step-item" id="stepDownload">Download</div>
                        <div class="step-item" id="stepTranscribe">Transcribe</div>
                        <div class="step-item" id="stepMetadata">Extract</div>
                    </div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                    <div class="status" id="statusMessage">Preparing...</div>
                    <div class="latest" id="latestText"></div>
                    <button class="btn" id="cancelBtn" style="margin-top: 16px; background: #fff; color: #c00; border: 1px solid #c00; display: none;">Cancel</button>
                </div>

                <!-- Results -->
                <div class="results-section" id="resultsSection">
                    <div style="border-top: 1px solid #ddd; padding-top: 24px; margin-top: 24px;">
                        <h2>Results</h2>
                        <p class="results-meta"><span id="totalCount"></span> graduates across <span id="groupCount"></span> programs</p>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th style="width:40px">#</th><th>Name</th><th>Degree</th></tr></thead>
                                <tbody id="graduatesBody"></tbody>
                            </table>
                        </div>
                        <div style="display: flex; gap: 12px; margin-top: 24px;">
                            <button class="btn" id="downloadCsv" style="flex:1; background: #fff; color: #1a1a1a; border: 1px solid #ccc;">Download CSV</button>
                            <button class="btn" id="tipBtn" style="flex:1; background: #008CFF; color: #fff;">Leave a tip</button>
                        </div>
                    </div>
                </div>

                <div class="queue-msg" id="queueMessage" style="display:none; padding: 12px 16px; border-left: 3px solid #999; background: #f9f9f7; color: #666; font-size: 14px; font-style: italic; margin-top: 16px;"></div>
                <div class="error-msg" id="errorMessage"></div>
            </div>

            <!-- Datasets tab -->
            <div class="tab-content" id="tab-datasets">
                <h2>Coverage</h2>
                <div class="heatmap-container">
                    <div class="heatmap-viewport" id="heatmapViewport">
                        <div class="heatmap-inner" id="heatmapInner"></div>
                    </div>
                </div>

                <h2>All Datasets</h2>
                <div id="datasetsList"></div>
            </div>
        </div>

        <!-- Tip modal -->
        <div id="tipModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
            <div style="background:#fff; border-radius:12px; padding:24px; max-width:380px; width:85%; text-align:center; position:relative;">
                <button id="tipClose" style="position:absolute; top:12px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:#999;">&times;</button>
                <h3 style="font-family:'Times New Roman',serif; font-size:20px; font-weight:400; margin-bottom:8px;">Thank you!</h3>
                <img src="/static/venmo-qr.png" alt="Venmo QR code" style="width:100%; border-radius:8px;">
            </div>
        </div>

        <footer>commencement.stt</footer>
    </div>

    <script>
        const INVITE_CODE = 'caps-fly-high';
        const inviteSection = document.getElementById('inviteSection');
        const appSection = document.getElementById('appSection');

        function unlockApp() {
            inviteSection.style.display = 'none';
            appSection.style.display = 'block';
            loadDatasets();
        }

        if (localStorage.getItem('stt_invited') === 'true') unlockApp();

        document.getElementById('inviteBtn').addEventListener('click', checkInvite);
        document.getElementById('inviteCode').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkInvite(); });

        function checkInvite() {
            const code = document.getElementById('inviteCode').value.trim().toLowerCase();
            if (code === INVITE_CODE) {
                localStorage.setItem('stt_invited', 'true');
                unlockApp();
            } else {
                document.getElementById('inviteError').style.display = 'block';
            }
        }

        // --- Tabs ---
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
                if (tab.dataset.tab === 'datasets') loadDatasets();
            });
        });

        const socket = io();
        const urlInput = document.getElementById('youtubeUrl');
        const startBtn = document.getElementById('startBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        let lastGraduates = [];
        let activeKey = null;

        // --- Persist & recover job state ---
        function getJobKeys() {
            try { return JSON.parse(localStorage.getItem('stt_job_keys') || '[]'); } catch(e) { return []; }
        }
        function saveJob(key, url) {
            activeKey = key;
            const keys = getJobKeys();
            if (!keys.includes(key)) keys.push(key);
            localStorage.setItem('stt_job_keys', JSON.stringify(keys));
            localStorage.setItem('stt_job_key', key);
            localStorage.setItem('stt_job_url', url);
        }
        function clearJob() {
            activeKey = null;
            localStorage.removeItem('stt_job_key');
            localStorage.removeItem('stt_job_url');
            cancelBtn.style.display = 'none';
        }
        function clearFinishedKey(key) {
            const keys = getJobKeys().filter(k => k !== key);
            localStorage.setItem('stt_job_keys', JSON.stringify(keys));
        }

        socket.on('connect', () => {
            const keys = getJobKeys();
            if (keys.length > 0) {
                if (localStorage.getItem('stt_invited') === 'true') unlockApp();
                keys.forEach(key => socket.emit('reconnect_job', { key }));
                const lastKey = localStorage.getItem('stt_job_key');
                if (lastKey) {
                    activeKey = lastKey;
                    showProgress();
                    cancelBtn.style.display = 'block';
                    document.getElementById('statusMessage').textContent = 'Reconnecting...';
                }
            }
            refreshUserQueue();
        });

        // --- Start ---
        startBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url) { urlInput.focus(); return; }
            startBtn.disabled = true;

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: url,
                    school: document.getElementById('school').value,
                    term: document.getElementById('term').value,
                    year: document.getElementById('year').value,
                    sid: socket.id,
                }),
            })
                .then(r => r.json())
                .then(data => {
                    startBtn.disabled = false;
                    if (data.error) { showError(data.error); return; }
                    if (data.key) saveJob(data.key, url);
                    showProgress();
                    cancelBtn.style.display = 'block';
                    urlInput.value = '';
                    refreshUserQueue();
                })
                .catch(err => { showError(err.message); startBtn.disabled = false; });
        });

        urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startBtn.click(); });

        // --- Cancel ---
        cancelBtn.addEventListener('click', () => { if (activeKey) socket.emit('cancel_job', { key: activeKey }); });

        socket.on('job_cancelled', () => {
            clearJob();
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('statusMessage').textContent = '';
            startBtn.disabled = false;
        });

        // --- Progress events ---
        function showProgress() {
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('latestText').textContent = '';
            ['stepDownload', 'stepTranscribe', 'stepMetadata'].forEach(id => {
                document.getElementById(id).className = 'step-item';
            });
            document.getElementById('stepDownload').classList.add('active');
            cancelBtn.style.display = 'block';
        }

        socket.on('download_progress', (data) => {
            document.getElementById('statusMessage').textContent = data.message;
        });

        socket.on('status', (data) => {
            document.getElementById('queueMessage').style.display = 'none';
            document.getElementById('statusMessage').textContent = data.message;
            if (data.step === 'download') {
                document.getElementById('stepDownload').classList.add('active');
            } else if (data.step === 'transcribe') {
                document.getElementById('stepDownload').className = 'step-item done';
                document.getElementById('stepTranscribe').className = 'step-item active';
            } else if (data.step === 'metadata') {
                document.getElementById('stepTranscribe').className = 'step-item done';
                document.getElementById('stepMetadata').className = 'step-item active';
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('latestText').textContent = '';
            }
        });

        socket.on('transcription_progress', (data) => {
            document.getElementById('progressBar').style.width = data.percent + '%';
            document.getElementById('statusMessage').textContent = 'Transcribing... ' + data.current_time + 's / ' + data.duration + 's';
            if (data.latest_text && data.latest_text !== '(cached)') {
                document.getElementById('latestText').textContent = data.latest_text;
            }
        });

        socket.on('transcription_complete', (data) => {
            document.getElementById('progressBar').style.width = '100%';
            let msg = data.total_segments + ' segments transcribed';
            if (data.cached) msg += ' (cached)';
            document.getElementById('statusMessage').textContent = msg;
            document.getElementById('latestText').textContent = '';
            document.getElementById('stepDownload').className = 'step-item done';
            document.getElementById('stepTranscribe').className = 'step-item done';
        });

        socket.on('metadata_progress', (data) => {
            document.getElementById('progressBar').style.width = data.percent + '%';
            document.getElementById('statusMessage').textContent = 'Extracting chunk ' + data.chunk + '/' + data.total_chunks + ' \u2014 ' + data.graduates_so_far + ' graduates found';
        });

        socket.on('metadata_complete', (data) => {
            document.getElementById('stepMetadata').className = 'step-item done';
            document.getElementById('totalCount').textContent = data.total_graduates;
            document.getElementById('groupCount').textContent = data.groups;
            lastGraduates = data.graduates;
            const tbody = document.getElementById('graduatesBody');
            tbody.innerHTML = '';
            data.graduates.forEach((g, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + (i+1) + '</td><td>' + escapeHtml(g.name) + '</td><td class="degree-cell">' + escapeHtml(g.degree || '?') + '</td>';
                tbody.appendChild(tr);
            });
            document.getElementById('resultsSection').classList.add('active');
        });

        socket.on('pipeline_complete', (data) => {
            if (activeKey) clearFinishedKey(activeKey);
            clearJob();
            refreshUserQueue();
            loadDatasets();
            const remainingKeys = getJobKeys();
            if (remainingKeys.length > 0) {
                activeKey = remainingKeys[0];
                localStorage.setItem('stt_job_key', activeKey);
                showProgress();
                cancelBtn.style.display = 'block';
                document.getElementById('statusMessage').textContent = 'Waiting for next job...';
                socket.emit('reconnect_job', { key: activeKey });
            }
            let msg = 'Done.';
            if (data && data.cost) {
                msg += ' Cost: $' + data.cost.total_cost.toFixed(4);
                msg += ' (Groq: $' + data.cost.groq.cost.toFixed(4) + ', OpenAI: $' + data.cost.openai.cost.toFixed(4) + ')';
            }
            document.getElementById('statusMessage').textContent = msg;
            startBtn.disabled = false;
        });

        socket.on('queue_position', (data) => {
            const el = document.getElementById('queueMessage');
            if (data.position > 0) {
                el.textContent = 'In queue \u2014 position ' + data.position + ' of ' + data.total + '. Please wait...';
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        });

        socket.on('error', (data) => { showError(data.message); clearJob(); startBtn.disabled = false; });

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.add('active');
        }

        // --- CSV download ---
        document.getElementById('downloadCsv').addEventListener('click', () => {
            if (!lastGraduates.length) return;
            const header = 'Name,Degree\n';
            const rows = lastGraduates.map(g => '"' + (g.name||'').replace(/"/g,'""') + '","' + (g.degree||'').replace(/"/g,'""') + '"').join('\n');
            const blob = new Blob([header + rows], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'graduates.csv';
            a.click();
        });

        // --- Tip modal ---
        document.getElementById('tipBtn').addEventListener('click', () => { document.getElementById('tipModal').style.display = 'flex'; });
        document.getElementById('tipClose').addEventListener('click', () => { document.getElementById('tipModal').style.display = 'none'; });
        document.getElementById('tipModal').addEventListener('click', (e) => { if (e.target === document.getElementById('tipModal')) document.getElementById('tipModal').style.display = 'none'; });

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        // --- User queue ---
        function refreshUserQueue() {
            const keys = getJobKeys();
            fetch('/queue?keys=' + keys.join(',')).then(r => r.json()).then(data => {
                const container = document.getElementById('userQueueList');
                const wrapper = document.getElementById('userQueue');
                const items = [];
                if (data.active) items.push({ ...data.active, status: 'Processing...', isActive: true });
                data.queued.forEach((j, i) => items.push({ ...j, status: 'Queued #' + (i+1), isActive: false }));
                if (!items.length) { wrapper.style.display = 'none'; return; }
                wrapper.style.display = 'block';
                container.innerHTML = items.map(j =>
                    `<div class="queue-item"><span class="qi-info">${escapeHtml(j.school)} ${j.term ? escapeHtml(j.term)+' ':''}${j.year}</span><span class="qi-status ${j.isActive?'active':''}">${j.status}</span></div>`
                ).join('');
            });
        }
        setInterval(refreshUserQueue, 5000);

        // --- Load schools dropdown ---
        function loadSchools() {
            fetch('/schools').then(r => r.json()).then(schools => {
                ALL_SCHOOLS = schools;
                const sel = document.getElementById('school');
                const current = sel.value;
                sel.innerHTML = '<option value="" disabled selected>Select school...</option>';
                schools.forEach(s => { sel.innerHTML += '<option value="' + escapeHtml(s) + '">' + escapeHtml(s) + '</option>'; });
                sel.innerHTML += '<option value="__request__">Request a school...</option>';
                if (current) sel.value = current;
            });
        }
        loadSchools();

        document.getElementById('school').addEventListener('change', (e) => {
            const wrap = document.getElementById('requestSchoolWrap');
            wrap.style.display = e.target.value === '__request__' ? 'block' : 'none';
            if (e.target.value === '__request__') document.getElementById('requestSchoolInput').focus();
        });

        document.getElementById('requestSchoolBtn').addEventListener('click', () => {
            const input = document.getElementById('requestSchoolInput');
            const msg = document.getElementById('requestSchoolMsg');
            const name = input.value.trim();
            if (!name) { input.focus(); return; }
            document.getElementById('requestSchoolBtn').disabled = true;
            msg.style.display = 'none';

            fetch('/request-school', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ school: name }) })
                .then(r => r.json())
                .then(data => {
                    document.getElementById('requestSchoolBtn').disabled = false;
                    msg.style.display = 'block';
                    msg.textContent = data.message || data.error;
                    msg.style.color = data.error ? '#c00' : '#666';
                    if (data.status === 'approved') {
                        loadSchools();
                        setTimeout(() => { document.getElementById('school').value = data.school; document.getElementById('requestSchoolWrap').style.display = 'none'; }, 500);
                    } else if (data.status === 'exists') {
                        document.getElementById('requestSchoolWrap').style.display = 'none';
                    }
                    input.value = '';
                })
                .catch(() => { document.getElementById('requestSchoolBtn').disabled = false; msg.style.display = 'block'; msg.textContent = 'Request failed.'; msg.style.color = '#c00'; });
        });
        document.getElementById('requestSchoolInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('requestSchoolBtn').click(); });

        // --- Heatmap + Datasets ---
        const TERMS = ['Winter', 'Spring', 'Summer', 'Fall'];
        const YEARS = [2025, 2024, 2023, 2022, 2021, 2020];

        let ALL_SCHOOLS = [];
        let allDatasets = [];
        let heatmapFilter = { type: null, value: null }; // {type: 'school'|'term', value: ...}

        function filterDatasets(type, value) {
            if (heatmapFilter.type === type && heatmapFilter.value === value) {
                // Deselect
                heatmapFilter = { type: null, value: null };
            } else {
                heatmapFilter = { type, value };
            }
            buildHeatmap(allDatasets);
            renderDatasetCards(allDatasets);
        }

        function renderDatasetCards(datasets) {
            const container = document.getElementById('datasetsList');
            let filtered = datasets;
            if (heatmapFilter.type === 'school') {
                filtered = datasets.filter(d => d.school === heatmapFilter.value);
            } else if (heatmapFilter.type === 'term') {
                filtered = datasets.filter(d => (d.term || '') + ' ' + d.year === heatmapFilter.value);
            } else if (heatmapFilter.type === 'cell') {
                filtered = datasets.filter(d => d.school === heatmapFilter.school && (d.term || '') === heatmapFilter.term && d.year === heatmapFilter.year);
            }

            if (!filtered.length) {
                container.innerHTML = '<p style="color:#999; font-size:14px;">No datasets' + (heatmapFilter.type ? ' for this selection' : ' yet') + '.</p>';
                return;
            }
            container.innerHTML = filtered.map(d => {
                const previewRows = d.preview.map(g => '<tr><td>' + escapeHtml(g.name) + '</td><td class="degree">' + escapeHtml(g.degree || '') + '</td></tr>').join('');
                const remaining = d.grad_count - d.preview.length;
                const safeId = d.id.replace(/[^a-zA-Z0-9_-]/g, '_');
                const previewId = 'preview-' + safeId;
                return `<div class="dataset-card">
                    <div class="dataset-header">
                        <div>
                            <div class="dataset-title">${escapeHtml(d.school)} ${d.term ? escapeHtml(d.term)+' ':''}${d.year}</div>
                            <div class="dataset-meta">${d.grad_count} / ${d.expected} graduates (${Math.round((d.completeness || 0) * 100)}%)</div>
                        </div>
                        <button class="btn-download" onclick="downloadDataset('${encodeURIComponent(d.id)}')">Download CSV</button>
                    </div>
                    <button class="dataset-toggle" onclick="togglePreview('${previewId}', this)">Show preview &darr;</button>
                    <div class="dataset-preview" id="${previewId}">
                        <table>${previewRows}</table>
                        ${remaining > 0 ? '<div class="more">+ ' + remaining + ' more</div>' : ''}
                    </div>
                </div>`;
            }).join('');
        }

        const HM_ZOOMS = ['min', 'mid', 'full'];
        let hmZoomIdx = 1;

        function heatmapZoom(dir) {
            hmZoomIdx = Math.max(0, Math.min(HM_ZOOMS.length - 1, hmZoomIdx + dir));
            applyHeatmapZoom();
        }

        function applyHeatmapZoom() {
            const container = document.querySelector('.heatmap-container');
            const viewport = document.getElementById('heatmapViewport');
            if (!container || !viewport) return;
            const zoom = HM_ZOOMS[hmZoomIdx];

            container.classList.remove('zoom-min', 'zoom-mid', 'zoom-full');
            container.classList.add('zoom-' + zoom);

            if (zoom === 'min') {
                viewport.classList.remove('scrollable');
            } else {
                viewport.classList.add('scrollable');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const viewport = document.getElementById('heatmapViewport');
            if (viewport) {
                let zooming = false;
                viewport.addEventListener('wheel', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        if (zooming) return;
                        zooming = true;
                        heatmapZoom(e.deltaY < 0 ? 1 : -1);
                        setTimeout(() => { zooming = false; }, 400);
                    }
                }, { passive: false });
            }
            applyHeatmapZoom();
        });

        function selectCell(school, term, year) {
            const key = school + '|' + term + '_' + year;
            if (heatmapFilter.type === 'cell' && heatmapFilter.value === key) {
                heatmapFilter = { type: null, value: null };
            } else {
                heatmapFilter = { type: 'cell', value: key, school, term, year };
            }
            buildHeatmap(allDatasets);
            renderDatasetCards(allDatasets);
        }

        function buildHeatmap(datasets) {
            const inner = document.getElementById('heatmapInner');

            // Build lookup
            const lookup = {};
            datasets.forEach(d => {
                const key = d.school + '|' + (d.term || '') + '_' + d.year;
                lookup[key] = d;
            });

            const dataSchools = [...new Set(datasets.map(d => d.school))];
            const schools = ALL_SCHOOLS.length ? [...ALL_SCHOOLS] : [];
            dataSchools.forEach(s => { if (!schools.includes(s)) schools.push(s); });

            const cols = [];
            YEARS.forEach(y => TERMS.forEach(t => cols.push({ term: t, year: y })));

            let html = '<table class="heatmap"><thead><tr><th></th>';
            cols.forEach(c => {
                const label = c.term.slice(0,2) + ' \'' + ('' + c.year).slice(2);
                const termKey = c.term + ' ' + c.year;
                const sel = heatmapFilter.type === 'term' && heatmapFilter.value === termKey ? ' selected' : '';
                html += '<th class="' + sel + '" onclick="filterDatasets(\'term\',\'' + termKey + '\')">' + label + '</th>';
            });
            html += '</tr></thead><tbody>';

            schools.forEach(school => {
                const hasAny = cols.some(c => lookup[school + '|' + c.term + '_' + c.year]);
                const isSelected = heatmapFilter.type === 'school' && heatmapFilter.value === school;
                const nameClass = 'school-name' + (isSelected ? ' selected' : '');
                const nameStyle = hasAny || isSelected ? '' : ' style="color:#bbb;"';

                html += '<tr><td class="' + nameClass + '"' + nameStyle + ' onclick="filterDatasets(\'school\',\'' + escapeHtml(school).replace(/'/g, "\\'") + '\')">' + escapeHtml(school) + '</td>';
                cols.forEach(c => {
                    const d = lookup[school + '|' + c.term + '_' + c.year];
                    const cellKey = school + '|' + c.term + '_' + c.year;
                    const isCellSelected = heatmapFilter.type === 'cell' && heatmapFilter.value === cellKey;
                    if (d) {
                        const pct = d.completeness || 0;
                        const lightness = Math.round(90 - pct * 60);
                        const bg = `hsl(145, 55%, ${lightness}%)`;
                        const selClass = isCellSelected ? ' selected' : '';
                        const pctLabel = Math.round(pct * 100) + '%';
                        html += '<td><div class="hm-cell has-data' + selClass + '" style="background:' + bg + ';" title="' + escapeHtml(school) + ' ' + c.term + ' ' + c.year + ': ' + d.grad_count + '/' + d.expected + ' (' + pctLabel + ')" onclick="selectCell(\'' + escapeHtml(school).replace(/'/g, "\\'") + '\',\'' + c.term + '\',' + c.year + ')"><span class="hm-label">' + pctLabel + '</span></div></td>';
                    } else {
                        html += '<td><div class="hm-empty"></div></td>';
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            // Build flat grid for min-zoom view
            const numCols = cols.length;
            let gridHtml = '<div class="hm-grid" style="grid-template-columns: repeat(' + numCols + ', 1fr);">';
            schools.forEach(school => {
                cols.forEach(c => {
                    const d = lookup[school + '|' + c.term + '_' + c.year];
                    const cellKey = school + '|' + c.term + '_' + c.year;
                    const isCellSelected = heatmapFilter.type === 'cell' && heatmapFilter.value === cellKey;
                    const selClass = isCellSelected ? ' selected' : '';
                    if (d) {
                        const pct = d.completeness || 0;
                        const lightness = Math.round(90 - pct * 60);
                        const bg = `hsl(145, 55%, ${lightness}%)`;
                        gridHtml += '<div class="hm-grid-cell' + selClass + '" style="background:' + bg + ';" title="' + escapeHtml(school) + ' ' + c.term + ' ' + c.year + ': ' + Math.round(pct * 100) + '%' + '" onclick="selectCell(\'' + escapeHtml(school).replace(/'/g, "\\'") + '\',\'' + c.term + '\',' + c.year + ')"></div>';
                    } else {
                        gridHtml += '<div class="hm-grid-cell"></div>';
                    }
                });
            });
            gridHtml += '</div>';

            inner.innerHTML = html + gridHtml;
            applyHeatmapZoom();
        }

        function loadDatasets() {
            fetch('/datasets').then(r => r.json()).then(datasets => {
                allDatasets = datasets;
                buildHeatmap(datasets);
                renderDatasetCards(datasets);
            });
        }

        function togglePreview(id, btn) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            btn.innerHTML = el.classList.contains('open') ? 'Hide preview &uarr;' : 'Show preview &darr;';
        }

        function downloadDataset(datasetId) {
            document.getElementById('tipModal').style.display = 'flex';
            setTimeout(() => { window.location.href = '/datasets/' + datasetId + '/csv'; }, 3000);
        }
    </script>
</body>
</html>

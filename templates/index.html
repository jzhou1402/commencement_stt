<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>commencement.stt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #fafaf8;
            color: #1a1a1a;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { max-width: 680px; margin: 0 auto; padding: 60px 24px; }

        /* Header */
        h1 { font-size: 32px; font-weight: 400; letter-spacing: -0.5px; margin-bottom: 4px; }
        .tagline { color: #666; font-size: 18px; font-style: italic; margin-bottom: 48px; }

        /* Sections */
        .section {
            border-top: 1px solid #ddd;
            padding: 32px 0;
        }

        h2 { font-size: 14px; font-weight: 400; text-transform: uppercase; letter-spacing: 1.5px; color: #999; margin-bottom: 20px; }

        /* Form */
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .form-group { flex: 1; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 10px 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #1a1a1a;
            outline: none;
        }
        input:focus { border-color: #1a1a1a; }
        input::placeholder { color: #bbb; }

        .btn {
            width: 100%;
            padding: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background: #1a1a1a;
            color: #fafaf8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #333; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Progress */
        .progress-section { display: none; padding: 24px 0; }
        .progress-section.active { display: block; }

        .steps { display: flex; gap: 24px; margin-bottom: 20px; font-size: 14px; }
        .step-item { color: #ccc; }
        .step-item.active { color: #1a1a1a; font-style: italic; }
        .step-item.done { color: #666; text-decoration: line-through; }

        .progress-bar-wrap {
            background: #eee;
            border-radius: 2px;
            height: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #1a1a1a;
            width: 0%;
            transition: width 0.3s ease;
        }

        .status { font-size: 14px; color: #666; margin-bottom: 4px; }
        .latest { font-size: 14px; color: #999; font-style: italic; }

        /* Results */
        .results-section { display: none; }
        .results-section.active { display: block; }

        .results-meta { font-size: 14px; color: #666; margin-bottom: 16px; }
        .results-meta span { color: #1a1a1a; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th {
            text-align: left;
            padding: 8px 0;
            border-bottom: 2px solid #1a1a1a;
            font-weight: 400;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }
        td {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        tr:hover td { background: #f5f5f3; }
        .degree-cell { font-size: 13px; color: #666; }
        .table-wrap { max-height: 600px; overflow-y: auto; }

        .error-msg {
            display: none;
            padding: 12px 16px;
            border-left: 3px solid #c00;
            background: #fff5f5;
            color: #900;
            font-size: 14px;
            margin-top: 16px;
        }
        .error-msg.active { display: block; }

        /* About */
        .about p { font-size: 15px; color: #666; margin-bottom: 12px; }
        .about a { color: #1a1a1a; }

        /* User queue */
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .queue-item .qi-info { color: #666; }
        .queue-item .qi-status { font-size: 12px; color: #999; font-style: italic; }
        .queue-item .qi-status.active { color: #1a1a1a; font-style: normal; font-weight: 600; }

        /* Datasets */
        .dataset-card { border: 1px solid #eee; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .dataset-toggle { background: none; border: none; font-family: 'Times New Roman', serif; font-size: 13px; color: #999; cursor: pointer; padding: 0; margin-top: 8px; }
        .dataset-toggle:hover { color: #1a1a1a; }
        .dataset-preview { display: none; }
        .dataset-preview.open { display: block; }
        .dataset-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .dataset-title { font-size: 16px; font-weight: 600; }
        .dataset-meta { font-size: 13px; color: #999; }
        .dataset-preview { font-size: 13px; color: #666; }
        .dataset-preview table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        .dataset-preview td { padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
        .dataset-preview .name { }
        .dataset-preview .degree { color: #999; font-size: 12px; }
        .dataset-preview .more { color: #999; font-style: italic; padding-top: 8px; }
        .btn-download { padding: 8px 16px; font-family: 'Times New Roman', serif; font-size: 13px; background: #1a1a1a; color: #fafaf8; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .btn-download:hover { background: #333; }

        footer { border-top: 1px solid #ddd; padding-top: 24px; margin-top: 48px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>commencement.stt</h1>
        <p class="tagline">Extract every graduate from a commencement ceremony.</p>

        <!-- Invite gate -->
        <div class="section" id="inviteSection">
            <h2>Enter invite code</h2>
            <div class="form-group" style="margin-bottom: 16px;">
                <input type="text" id="inviteCode" placeholder="three-word-code" autocomplete="off" style="text-align:center; letter-spacing: 1px;">
            </div>
            <button class="btn" id="inviteBtn">Enter</button>
            <p id="inviteError" style="display:none; color:#c00; font-size:13px; margin-top:12px; text-align:center;">Invalid invite code.</p>
        </div>

        <!-- Input (hidden until invited) -->
        <div class="section" id="mainSection" style="display:none;">
            <h2>Process a ceremony</h2>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>YouTube URL</label>
                <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>School</label>
                    <input type="text" id="school" placeholder="e.g. MIT">
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="year" placeholder="2025" value="2025">
                </div>
            </div>
            <button class="btn" id="startBtn">Extract graduates</button>
            <div id="userQueue" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px;">
                <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 8px;">Your queue</div>
                <div id="userQueueList"></div>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="steps">
                <div class="step-item" id="stepDownload">Download</div>
                <div class="step-item" id="stepTranscribe">Transcribe</div>
                <div class="step-item" id="stepMetadata">Extract</div>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="status" id="statusMessage">Preparing...</div>
            <div class="latest" id="latestText"></div>
            <button class="btn" id="cancelBtn" style="margin-top: 16px; background: #fff; color: #c00; border: 1px solid #c00; display: none;">Cancel</button>
        </div>

        <!-- Results -->
        <div class="results-section" id="resultsSection">
            <div class="section">
                <h2>Results</h2>
                <p class="results-meta"><span id="totalCount"></span> graduates across <span id="groupCount"></span> programs</p>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:40px">#</th>
                                <th>Name</th>
                                <th>Degree</th>
                            </tr>
                        </thead>
                        <tbody id="graduatesBody"></tbody>
                    </table>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button class="btn" id="downloadCsv" style="flex:1; background: #fff; color: #1a1a1a; border: 1px solid #ccc;">Download CSV</button>
                    <button class="btn" id="tipBtn" style="flex:1; background: #008CFF; color: #fff;">☕ Leave a tip 🎓</button>
                </div>
            </div>
        </div>

        <!-- Tip modal -->
        <div id="tipModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
            <div style="background:#fff; border-radius:12px; padding:24px; max-width:380px; width:85%; text-align:center; position:relative;">
                <button id="tipClose" style="position:absolute; top:12px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:#999;">&times;</button>
                <h3 style="font-family:'Times New Roman',serif; font-size:20px; font-weight:400; margin-bottom:8px;">Thank you!</h3>
                <img src="/static/venmo-qr.png" alt="Venmo QR code" style="width:100%; border-radius:8px;">
            </div>
        </div>

        <div class="queue-msg" id="queueMessage" style="display:none; padding: 12px 16px; border-left: 3px solid #999; background: #f9f9f7; color: #666; font-size: 14px; font-style: italic; margin-top: 16px;"></div>
        <div class="error-msg" id="errorMessage"></div>

        <!-- Tip jar -->
        <div class="section gated" id="tipSection" style="display:none;">
            <h2>LEAVE A TIP</h2>
            <button class="btn" id="tipBtnFooter" style="background: #008CFF; color: #fff; font-size: 16px;">☕ Tip via Venmo 🎓</button>
        </div>

        <!-- Datasets -->
        <div class="section gated" id="datasetsSection" style="display:none;">
            <h2>DATASETS</h2>
            <div id="datasetsList"></div>
        </div>

        <footer>commencement.stt</footer>
    </div>

    <script>
        const INVITE_CODE = 'caps-fly-high';

        // Invite gate
        const inviteSection = document.getElementById('inviteSection');
        const mainSection = document.getElementById('mainSection');

        function unlockApp() {
            inviteSection.style.display = 'none';
            mainSection.style.display = 'block';
            document.getElementById('tipSection').style.display = 'block';
            document.getElementById('datasetsSection').style.display = 'block';
            loadDatasets();
        }

        if (localStorage.getItem('stt_invited') === 'true') {
            unlockApp();
        }

        document.getElementById('inviteBtn').addEventListener('click', checkInvite);
        document.getElementById('inviteCode').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkInvite(); });

        function checkInvite() {
            const code = document.getElementById('inviteCode').value.trim().toLowerCase();
            if (code === INVITE_CODE) {
                localStorage.setItem('stt_invited', 'true');
                unlockApp();
            } else {
                document.getElementById('inviteError').style.display = 'block';
            }
        }

        const socket = io();
        const urlInput = document.getElementById('youtubeUrl');
        const startBtn = document.getElementById('startBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        let lastGraduates = [];
        let activeKey = null;

        // --- Persist & recover job state ---
        function saveJob(key, url) {
            activeKey = key;
            localStorage.setItem('stt_job_key', key);
            localStorage.setItem('stt_job_url', url);
        }
        function clearJob() {
            activeKey = null;
            localStorage.removeItem('stt_job_key');
            localStorage.removeItem('stt_job_url');
            cancelBtn.style.display = 'none';
        }

        // On load: try to reconnect to an in-progress job
        socket.on('connect', () => {
            const savedKey = localStorage.getItem('stt_job_key');
            if (savedKey) {
                activeKey = savedKey;
                showProgress();
                document.getElementById('statusMessage').textContent = 'Reconnecting...';
                socket.emit('reconnect_job', { key: savedKey });
            }
        });

        // --- Start ---
        startBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url) { urlInput.focus(); return; }

            startBtn.disabled = true;

            fetch('/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: url,
                    school: document.getElementById('school').value,
                    year: document.getElementById('year').value,
                    sid: socket.id,
                }),
            })
                .then(r => r.json())
                .then(data => {
                    startBtn.disabled = false;
                    if (data.error) { showError(data.error); return; }
                    if (data.key) saveJob(data.key, url);
                    showProgress();
                    cancelBtn.style.display = 'block';
                    urlInput.value = '';
                    refreshUserQueue();
                })
                .catch(err => { showError(err.message); startBtn.disabled = false; });
        });

        urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startBtn.click(); });

        // --- Cancel ---
        cancelBtn.addEventListener('click', () => {
            if (activeKey) {
                socket.emit('cancel_job', { key: activeKey });
            }
        });

        socket.on('job_cancelled', () => {
            clearJob();
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('statusMessage').textContent = '';
            startBtn.disabled = false;
        });

        // --- Progress events ---
        function showProgress() {
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('latestText').textContent = '';
            ['stepDownload', 'stepTranscribe', 'stepMetadata'].forEach(id => {
                document.getElementById(id).className = 'step-item';
            });
            document.getElementById('stepDownload').classList.add('active');
            cancelBtn.style.display = 'block';
        }

        socket.on('status', (data) => {
            document.getElementById('queueMessage').style.display = 'none';
            document.getElementById('statusMessage').textContent = data.message;
            if (data.step === 'download') {
                document.getElementById('stepDownload').classList.add('active');
            } else if (data.step === 'transcribe') {
                document.getElementById('stepDownload').className = 'step-item done';
                document.getElementById('stepTranscribe').className = 'step-item active';
            } else if (data.step === 'metadata') {
                document.getElementById('stepTranscribe').className = 'step-item done';
                document.getElementById('stepMetadata').className = 'step-item active';
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('latestText').textContent = '';
            }
        });

        socket.on('download_progress', (data) => {
            document.getElementById('statusMessage').textContent = data.message;
        });

        socket.on('transcription_progress', (data) => {
            document.getElementById('progressBar').style.width = data.percent + '%';
            document.getElementById('statusMessage').textContent =
                'Transcribing... ' + data.current_time + 's / ' + data.duration + 's';
            if (data.latest_text && data.latest_text !== '(cached)') {
                document.getElementById('latestText').textContent = data.latest_text;
            }
        });

        socket.on('transcription_complete', (data) => {
            document.getElementById('progressBar').style.width = '100%';
            let msg = data.total_segments + ' segments transcribed';
            if (data.cached) msg += ' (cached)';
            document.getElementById('statusMessage').textContent = msg;
            document.getElementById('latestText').textContent = '';
            document.getElementById('stepDownload').className = 'step-item done';
            document.getElementById('stepTranscribe').className = 'step-item done';
        });

        socket.on('metadata_progress', (data) => {
            document.getElementById('progressBar').style.width = data.percent + '%';
            document.getElementById('statusMessage').textContent =
                'Extracting chunk ' + data.chunk + '/' + data.total_chunks +
                ' \u2014 ' + data.graduates_so_far + ' graduates found';
        });

        socket.on('metadata_complete', (data) => {
            document.getElementById('stepMetadata').className = 'step-item done';
            document.getElementById('totalCount').textContent = data.total_graduates;
            document.getElementById('groupCount').textContent = data.groups;
            lastGraduates = data.graduates;

            const tbody = document.getElementById('graduatesBody');
            tbody.innerHTML = '';
            data.graduates.forEach((g, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + (i + 1) + '</td>' +
                    '<td>' + escapeHtml(g.name) + '</td>' +
                    '<td class="degree-cell">' + escapeHtml(g.degree || '?') + '</td>';
                tbody.appendChild(tr);
            });

            document.getElementById('resultsSection').classList.add('active');
        });

        socket.on('pipeline_complete', (data) => {
            clearJob();
            refreshUserQueue();
            loadDatasets();
            let msg = 'Done.';
            if (data && data.cost) {
                msg += ' Cost: $' + data.cost.total_cost.toFixed(4);
                msg += ' (Groq: $' + data.cost.groq.cost.toFixed(4);
                msg += ', OpenAI: $' + data.cost.openai.cost.toFixed(4) + ')';
            }
            document.getElementById('statusMessage').textContent = msg;
            startBtn.disabled = false;
        });

        socket.on('queue_position', (data) => {
            const el = document.getElementById('queueMessage');
            if (data.position > 0) {
                el.textContent = 'In queue \u2014 position ' + data.position + ' of ' + data.total + '. Please wait...';
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        });

        socket.on('error', (data) => {
            showError(data.message);
            clearJob();
            startBtn.disabled = false;
        });

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.add('active');
        }

        // --- CSV download ---
        document.getElementById('downloadCsv').addEventListener('click', () => {
            if (!lastGraduates.length) return;
            const header = 'Name,Degree\n';
            const rows = lastGraduates.map(g => {
                const name = '"' + (g.name || '').replace(/"/g, '""') + '"';
                const degree = '"' + (g.degree || '').replace(/"/g, '""') + '"';
                return name + ',' + degree;
            }).join('\n');
            const blob = new Blob([header + rows], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'graduates.csv';
            a.click();
        });

        // --- Tip modal ---
        document.getElementById('tipBtn').addEventListener('click', () => {
            document.getElementById('tipModal').style.display = 'flex';
        });
        document.getElementById('tipBtnFooter').addEventListener('click', () => {
            document.getElementById('tipModal').style.display = 'flex';
        });
        document.getElementById('tipClose').addEventListener('click', () => {
            document.getElementById('tipModal').style.display = 'none';
        });
        document.getElementById('tipModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('tipModal'))
                document.getElementById('tipModal').style.display = 'none';
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- User queue ---
        function refreshUserQueue() {
            fetch('/queue').then(r => r.json()).then(data => {
                const container = document.getElementById('userQueueList');
                const wrapper = document.getElementById('userQueue');
                const items = [];
                if (data.active) {
                    items.push({ ...data.active, status: 'Processing...' , isActive: true });
                }
                data.queued.forEach((j, i) => {
                    items.push({ ...j, status: 'Queued #' + (i + 1), isActive: false });
                });
                if (items.length === 0) {
                    wrapper.style.display = 'none';
                    return;
                }
                wrapper.style.display = 'block';
                container.innerHTML = items.map(j =>
                    `<div class="queue-item">
                        <span class="qi-info">${escapeHtml(j.school)} ${j.year}</span>
                        <span class="qi-status ${j.isActive ? 'active' : ''}">${j.status}</span>
                    </div>`
                ).join('');
            });
        }

        // Refresh queue periodically
        setInterval(refreshUserQueue, 5000);

        // --- Datasets ---
        function loadDatasets() {
            fetch('/datasets').then(r => r.json()).then(datasets => {
                const container = document.getElementById('datasetsList');
                if (!datasets.length) {
                    container.innerHTML = '<p style="color:#999; font-size:14px;">No datasets yet.</p>';
                    return;
                }
                container.innerHTML = datasets.map(d => {
                    const previewRows = d.preview.map(g =>
                        '<tr><td class="name">' + escapeHtml(g.name) + '</td><td class="degree">' + escapeHtml(g.degree || '') + '</td></tr>'
                    ).join('');
                    const remaining = d.grad_count - d.preview.length;
                    const previewId = 'preview-' + d.id;
                    return `
                        <div class="dataset-card">
                            <div class="dataset-header">
                                <div>
                                    <div class="dataset-title">${escapeHtml(d.school)} ${d.year}</div>
                                    <div class="dataset-meta">${d.grad_count} graduates &middot; <a href="https://youtube.com/watch?v=${d.id}" target="_blank" style="color:#999;">source</a></div>
                                </div>
                                <button class="btn-download" onclick="downloadDataset('${d.id}')">Download CSV</button>
                            </div>
                            <button class="dataset-toggle" onclick="togglePreview('${previewId}', this)">Show preview &darr;</button>
                            <div class="dataset-preview" id="${previewId}">
                                <table>${previewRows}</table>
                                ${remaining > 0 ? '<div class="more">+ ' + remaining + ' more</div>' : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function togglePreview(id, btn) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            btn.innerHTML = el.classList.contains('open') ? 'Hide preview &uarr;' : 'Show preview &darr;';
        }

        function downloadDataset(videoId) {
            // Show tip modal first, then download
            document.getElementById('tipModal').style.display = 'flex';
            // Add a one-time listener for when they close the modal
            const modal = document.getElementById('tipModal');
            const handler = () => {
                window.location.href = '/datasets/' + videoId + '/csv';
                modal.removeEventListener('click', handler);
            };
            // Download after a short delay (let them see the QR)
            setTimeout(() => {
                window.location.href = '/datasets/' + videoId + '/csv';
            }, 3000);
        }
    </script>
</body>
</html>
